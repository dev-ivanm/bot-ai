name: Deploy to VPS

on:
  push:
    branches:
      - main  # Cambia a la rama que uses como principal si no es main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            cd /opt/bot-ai || { echo "Error: Directorio /opt/bot-ai no encontrado"; exit 1; }
            
            # Forzar actualización al último estado de GitHub
            git fetch origin
            git reset --hard origin/main
            
            # Levantar contenedores (reconstruyendo solo lo necesario)
            docker compose up -d --build
            
            # Limpieza de imágenes antiguas para no llenar el disco del VPS
            docker image prune -f
