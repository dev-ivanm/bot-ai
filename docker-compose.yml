services:
  # --- Base de Datos (Postgres) ---
  evolution_database:
    image: postgres:15-alpine
    container_name: evolution_database
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: evolution_api
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - evolution_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # --- Cache (Redis) ---
  evolution_redis:
    image: redis:7-alpine
    container_name: evolution_redis
    restart: always
    networks:
      - evolution_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # --- Evolution API ---
  evolution_api:
    image: evoapicloud/evolution-api:latest
    container_name: evolution_api
    restart: always
    depends_on:
      evolution_database:
        condition: service_healthy
      evolution_redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SERVER_TYPE: http
      SERVER_URL: https://evolution.104.237.11.142.sslip.io
      # SERVER_URL: http://localhost:8080 # Local
      INTEGRATION: WHATSAPP-BAILEYS
      AUTHENTICATION_TYPE: "apikey"
      AUTHENTICATION_API_KEY: "42244224"
      AUTHENTICATION_EXPOSE_IN_ENV: "true"
      CORS_ORIGIN: "*"
      CORS_METHODS: "GET,POST,PUT,DELETE"
      CORS_ALLOWED_HEADERS: "*"
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: "postgresql://postgres:postgres@evolution_database:5432/evolution_api?sslmode=disable"
      DATABASE_CONNECTION_CLIENT_NAME: "evolution_db"
      
      # --- Persistencia (Ajustado) ---
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      DATABASE_SAVE_DATA_LABELS: "true"
      DATABASE_SAVE_MESSAGE_FILES: "true"
      
      # --- Sincronización (Ajustado) ---
      QRCODE_LIMIT: 30
      CLEAN_STORE_CLEAN_CHAT: "false"
      CLEAN_STORE_CLEAN_CONTACT: "false"
      READ_MESSAGES: "true"
      READ_STATUS: "true"
      SYNC_FULL_HISTORY: "true"

      # --- Redis & WebSockets ---
      REDIS_ENABLED: "true"
      REDIS_URI: "redis://evolution_redis:6379"
      REDIS_HOST: evolution_redis
      REDIS_PORT: 6379
      CACHE_REDIS_ENABLED: "false"
      WEBSOCKET_ENABLED: "true"
      WEBSOCKET_GLOBAL_EVENTS: "true"
      WEBSOCKET_GLOBAL_EVENTS_ENABLED: "true"
      WEBSOCKET_TYPE: "socket.io"
      WEBSOCKET_ALLOWED_HOSTS: "*"
      WEBSOCKET_ALLOWED_ORIGINS: "*"
      SOCKETIO_CORS_ORIGIN: "*"
      CORS_ALLOW_CREDENTIALS: "true"
      
      # --- Webhooks ---
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_URL: http://evolution_backend:3001/api/webhook/evolution
      # WEBHOOK_GLOBAL_URL: http://host.docker.internal:3001/api/webhook/evolution # Local
      WEBHOOK_EVENTS: MESSAGES_UPSERT,MESSAGES_UPDATE,CONNECTION_UPDATE,QRCODE_UPDATED,CHATS_SET,CHATS_UPDATE,CHATS_UPSERT,MESSAGES_SET,MESSAGES_UPDATE,SEND_MESSAGE
      
      CONFIG_SESSION_PHONE_CLIENT: Chrome
      CONFIG_SESSION_PHONE_NAME: Windows
      WA_VERSION: "2.3000.1015901307"

    volumes:
      - ./evolution_instances:/evolution/instances
    networks:
      - evolution_net

  # --- Tu Backend (Bot-AI) ---
  evolution_backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: evolution_backend
    restart: always
    networks:
      - evolution_net
    ports:
      - "3000:3000"
    depends_on:
      - evolution_api
    env_file:
      - ./backend/.env

networks:
  evolution_net:
    driver: bridge
